<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มบันทึกข้อมูลนักเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { max-width: 600px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container my-5 d-flex justify-content-center">
    <div class="form-container w-100">
        <h3 class="text-center mb-4 text-primary">ฟอร์มบันทึกข้อมูลนักเรียน</h3>
        
        <form id="studentForm">
            <div class="mb-3">
                <label class="form-label">คำนำหน้าชื่อ</label>
                <select class="form-select" name="prefix" required>
                    <option value="" disabled selected>เลือกคำนำหน้าชื่อ</option>
                    <option value="เด็กชาย">เด็กชาย</option>
                    <option value="เด็กหญิง">เด็กหญิง</option>
                    <option value="นาย">นาย</option>
                    <option value="นางสาว">นางสาว</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">ชื่อ</label>
                    <input type="text" class="form-control" name="firstName" required placeholder="เช่น สมชาย">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">นามสกุล</label>
                    <input type="text" class="form-control" name="lastName" required placeholder="เช่น ใจดี">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">ชั้นมัธยมศึกษาปีที่</label>
                    <select class="form-select" name="grade" required>
                        <option value="" disabled selected>เลือกชั้นปี</option>
                        <option value="1">ม.1</option>
                        <option value="2">ม.2</option>
                        <option value="3">ม.3</option>
                        <option value="4">ม.4</option>
                        <option value="5">ม.5</option>
                        <option value="6">ม.6</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">ห้อง</label>
                    <input type="number" class="form-control" name="room" min="1" required placeholder="เช่น 1">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">เลขที่</label>
                    <input type="number" class="form-control" name="no" min="1" required placeholder="เช่น 15">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">น้ำหนัก (ก.ก.)</label>
                    <input type="number" step="0.1" class="form-control" name="weight" required placeholder="เช่น 55.5">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">ส่วนสูง (ซ.ม.)</label>
                    <input type="number" step="0.1" class="form-control" name="height" required placeholder="เช่น 165.0">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3 py-2">บันทึกข้อมูล</button>
        </form>
    </div>
</div>

<script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbwiVK_3XApBz_JX8SgCbRx5JWWNlDKcvfqIpccdzv8oxejgZQ7u24vLsIcjuln6NhPX/exec";

    document.getElementById('studentForm').addEventListener('submit', function(e) {
        e.preventDefault(); // ป้องกันการรีโหลดหน้าจอตามปกติของฟอร์ม

        // แสดง SweetAlert2 สถานะกำลังบันทึก (Loading)
        Swal.fire({
            title: 'กำลังบันทึกข้อมูล...',
            text: 'กรุณารอสักครู่ระบบกำลังส่งข้อมูลไปยัง Google Sheets',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        // ดึงข้อมูลจากฟอร์ม
        const formData = new FormData(this);
        
        // แปลงข้อมูลฟอร์มให้อยู่ในรูป Query String สำหรับส่งแบบ JSONP
        const params = new URLSearchParams();
        formData.forEach((value, key) => {
            params.append(key, value);
        });
        
        // กำหนดชื่อฟังก์ชัน callback สำหรับ JSONP (ส่งไปให้ฝั่ง Apps Script เรียกกลับมา)
        const callbackName = 'jsonpCallback_' + Date.now();
        params.append('callback', callbackName);

        // สร้างแท็ก <script> เพื่อส่งข้อมูลข้าม Domain (JSONP)
        const script = document.createElement('script');
        script.src = `${scriptUrl}?${params.toString()}`;

        // สร้างฟังก์ชัน Callback ไว้รอรับการตอบกลับจาก Apps Script
        window[callbackName] = function(response) {
            if (response.result === 'success') {
                // แสดง SweetAlert2 เมื่อบันทึกสำเร็จ
                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกสำเร็จ!',
                    text: 'ข้อมูลของนักเรียนถูกบันทึกลงในระบบเรียบร้อยแล้ว',
                    confirmButtonText: 'ตกลง'
                });
                document.getElementById('studentForm').reset(); // เคลียร์ข้อมูลในฟอร์มหลังบันทึกสำเร็จ
            } else {
                // กรณีทางฝั่ง Apps Script ส่งเออเร่อกลับมา
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถบันทึกข้อมูลได้: ' + response.message,
                });
            }
            // ลบแท็ก script และฟังก์ชันชั่วคราวออกเพื่อประหยัดหน่วยความจำ
            document.body.removeChild(script);
            delete window[callbackName];
        };

        // หากสคริปต์โหลดไม่สำเร็จ (เช่น URL ผิด หรืออินเทอร์เน็ตหลุด)
        script.onerror = function() {
            Swal.fire({
                icon: 'error',
                title: 'การเชื่อมต่อล้มเหลว',
                text: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง',
            });
            document.body.removeChild(script);
            delete window[callbackName];
        };

        // ส่งสคริปต์เข้าไปใน body เพื่อให้เริ่มทำงาน (ยิง Request ไปยัง App Script)
        document.body.appendChild(script);
    });
</script>

</body>
</html>
